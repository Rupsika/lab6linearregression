apiVersion: apps/v1
kind: Deployment
metadata:
  name: linear-regression-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linear-regression
  template:
    metadata:
      labels:
        app: linear-regression
    spec:
      containers:
      - name: lr-container
        image: linear-regression:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
